<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Release Notifications</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg height="32" width="32" viewBox="0 0 16 16" aria-hidden="true">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
          0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
          -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
          .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
          -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.65 7.65 0 0 1 2-.27
          c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12
          .51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
          0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8
          c0-4.42-3.58-8-8-8z"/>
      </svg>
      <div>
        <h2>GitHub Release Notifications</h2>
        <p class="subtitle">Get emailed when a new release is published</p>
      </div>
    </div>

    <!-- Subscribe section -->
    <div id="subscribeSection">
      <form id="subscribeForm" novalidate>
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
          <span class="field-error" id="emailError"></span>
        </div>
        <div class="form-group">
          <label for="repo">GitHub repository</label>
          <input type="text" id="repo" name="repo" placeholder="owner/repo" required autocomplete="off" spellcheck="false">
          <p class="hint">Example: <code>golang/go</code> or <code>torvalds/linux</code></p>
          <span class="field-error" id="repoError"></span>
        </div>
        <button type="submit" class="btn" id="submitBtn" disabled>Subscribe</button>
      </form>
      <div id="subscribeAlert" class="alert"></div>
    </div>

    <!-- Confirm section -->
    <div id="confirmSection">
      <div class="confirm-icon" id="confirmIcon">⏳</div>
      <div id="confirmAlert" class="alert info">Confirming your subscription…</div>
    </div>

    <!-- Unsubscribe section -->
    <div id="unsubscribeSection">
      <div class="confirm-icon" id="unsubscribeIcon">⏳</div>
      <div id="unsubscribeAlert" class="alert info">Unsubscribing…</div>
    </div>

    <footer>
      <a href="https://github.com/dmytrovoron/github-release-notification" target="_blank" rel="noopener noreferrer">View source</a>
    </footer>
  </div>

  <script src="/app.js"></script>
</body>
</html>
