services:
  db:
    image: postgres:18-alpine
    container_name: gh-release-notification-db
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 3s
      retries: 10

  smtp:
    image: axllent/mailpit:latest
    container_name: gh-release-notification-email
    ports:
      - "1025:1025"
      - "8025:8025"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gh-release-notification-app
    environment:
      DATABASE_URL: postgres://app:app@db:5432/app?sslmode=disable
      MIGRATIONS_PATH: file:///app/migrations
      GITHUB_AUTH_TOKEN: ${GITHUB_AUTH_TOKEN}
      SCANNER_INTERVAL: 5s
      NOTIFIER_INTERVAL: 5s
    depends_on:
      db:
        condition: service_healthy
      smtp:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8080/healthz > /dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    ports:
      - "8080:8080"

volumes:
  postgres_data:
